name: ADM Quality Gate

on:
  push:
    branches: [main, master, dev, 'release/**']
  pull_request:
    branches: [main, master, dev, 'release/**']
  workflow_dispatch:
    inputs:
      review_gate_mode:
        description: ADM review validation mode for manual runs
        required: true
        default: existing-strict
        type: choice
        options:
          - advisory
          - existing-strict
          - complete-set
      review_set_id:
        description: Optional review_set_id for complete-set runs
        required: false
        type: string
      reviewed_commit:
        description: Optional stable code-under-review commit SHA for complete-set runs
        required: false
        type: string

jobs:
  line-limit-check:
    name: ADM quality checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run ADM line-limit validator
        run: |
          if [ -f "scripts/check_limits.py" ]; then
            python scripts/check_limits.py --path . --max-lines 300
          elif [ -f "check-limits.py" ]; then
            python check-limits.py --path . --max-lines 300
          else
            echo "Error: ADM line-limit validator not found. Expected scripts/check_limits.py."
            exit 1
          fi

      - name: Run ADM review validator tests
        run: |
          if [ -f "scripts/test_validate_reviews.py" ]; then
            python scripts/test_validate_reviews.py
          else
            echo "ADM review validator fixture tests not found; skipped."
          fi

      - name: Run ADM review validator
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          REF_NAME: ${{ github.ref_name }}
          REF: ${{ github.ref }}
          SHA: ${{ github.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          DISPATCH_MODE: ${{ inputs.review_gate_mode }}
          DISPATCH_REVIEW_SET_ID: ${{ inputs.review_set_id }}
          DISPATCH_REVIEWED_COMMIT: ${{ inputs.reviewed_commit }}
        run: |
          set -eu

          if [ ! -f "scripts/validate_reviews.py" ]; then
            echo "ADM review validator not found; review check skipped."
            exit 0
          fi

          mode="advisory"
          target_ref="$REF_NAME"
          target_commit="$SHA"

          if [ "$EVENT_NAME" = "pull_request" ]; then
            target_ref="PR-$PR_NUMBER"
          fi

          reviewed_commit="${DISPATCH_REVIEWED_COMMIT:-}"
          if [ -z "$reviewed_commit" ]; then
            reviewed_commit="$(git log -n 1 --format=%H -- . ':(exclude).ai/reviews/**')"
          fi
          if [ -n "$reviewed_commit" ]; then
            target_commit="$reviewed_commit"
          fi

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            mode="${DISPATCH_MODE:-existing-strict}"
          elif [[ "$BASE_REF" == release/* ]] || [[ "$REF" == refs/heads/release/* ]]; then
            mode="complete-set"
          elif [ "$BASE_REF" = "main" ] || [ "$BASE_REF" = "master" ]; then
            mode="existing-strict"
          elif [ "$REF" = "refs/heads/main" ] || [ "$REF" = "refs/heads/master" ]; then
            mode="existing-strict"
          fi

          echo "ADM review validation mode: $mode"
          echo "ADM review target_ref: $target_ref"
          echo "ADM reviewed code commit: $target_commit"

          cmd=(python scripts/validate_reviews.py --path . --mode "$mode")
          if [ "$mode" = "complete-set" ]; then
            cmd+=(--target-ref "$target_ref" --target-commit "$target_commit")
            if [ -n "${DISPATCH_REVIEW_SET_ID:-}" ]; then
              cmd+=(--review-set-id "$DISPATCH_REVIEW_SET_ID")
            fi
          fi
          "${cmd[@]}"
